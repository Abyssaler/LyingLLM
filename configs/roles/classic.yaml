name: "经典狼人杀角色配置"
version: "1.0"
description: "标准狼人杀角色定义，包含狼人、村民、预言家、女巫、猎人、守卫六种角色"

roles:
  werewolf:
    name: "狼人"
    faction: wolf
    night_priority: 2
    description: "夜间选择一名玩家击杀，互相知道身份"
    skills:
      - name: "kill"
        phase: night
        description: "每晚选择一名玩家击杀"
        target_type: single_player
        faction_discuss: true
    prompt_hint: "你是狼人，夜间与同伴协商选择击杀目标。白天需要伪装身份，引导好人阵营误投村民。"

  villager:
    name: "村民"
    faction: village
    night_priority: null
    description: "无特殊技能，依靠推理发言辨别狼人"
    skills: []
    prompt_hint: "你是村民，没有特殊技能，依靠白天的发言和推理来辨别狼人。"

  seer:
    name: "预言家"
    faction: village
    night_priority: 4
    description: "每晚可查验一名玩家的身份（是否为狼人）"
    skills:
      - name: "check"
        phase: night
        description: "每晚查验一名玩家的身份"
        target_type: single_player
        result_type: boolean_wolf
    prompt_hint: "你是预言家，每晚可以查验一名玩家是否为狼人。利用查验结果带领好人阵营。"

  witch:
    name: "女巫"
    faction: village
    night_priority: 3
    description: "拥有一瓶解药（救人）和一瓶毒药（毒人），各限用一次"
    skills:
      - name: "save"
        phase: night
        description: "解药：救活当晚被狼人杀害的玩家"
        target_type: wolf_target
        uses: 1
        self_save_allowed: false
      - name: "poison"
        phase: night
        description: "毒药：毒杀一名玩家"
        target_type: single_player
        uses: 1
    prompt_hint: "你是女巫，拥有一瓶解药和一瓶毒药，各限用一次。解药可救活当晚被狼刀的玩家，毒药可毒杀一名玩家。"

  hunter:
    name: "猎人"
    faction: village
    night_priority: null
    description: "死亡时可开枪带走一名玩家"
    skills:
      - name: "shoot"
        phase: on_death
        description: "死亡时可选择开枪带走一名存活玩家"
        target_type: single_player
        trigger: on_death
        can_shoot_on_witch_kill: true
    prompt_hint: "你是猎人，当你死亡时（被投票处决或被狼人杀死）可以选择开枪带走一名存活玩家。"

  guard:
    name: "守卫"
    faction: village
    night_priority: 1
    description: "每晚可选择守护一名玩家，被守护的玩家若被狼人袭击则不会死亡；不可连续两晚守护同一人"
    skills:
      - name: "guard"
        phase: night
        description: "每晚守护一名玩家，使其免受狼人袭击"
        target_type: single_player
        cannot_guard_same_twice: true
        can_empty_guard: true
    prompt_hint: "你是守卫，每晚可以选择守护一名玩家使其免受狼人袭击，但不能连续两晚守同一人。"